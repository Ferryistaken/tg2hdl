site_name: tg2hdl
site_description: tinygrad to HDL experiments for INT8 GEMV acceleration
site_url: https://example.com/
repo_url: https://github.com/
repo_name: tg2hdl

theme:
  name: material
  features:
    - navigation.tabs
    - navigation.sections
    - navigation.top
    - content.code.copy
    - search.suggest
    - search.highlight
  palette:
    - scheme: slate
      primary: blue grey
      accent: cyan

plugins:
  - search
  - mkdocstrings:
      handlers:
        python:
          paths:
            - .

markdown_extensions:
  - admonition
  - pymdownx.superfences
  - pymdownx.highlight
  - pymdownx.inlinehilite
  - pymdownx.tabbed:
      alternate_style: true

nav:
  - Home: index.md
  - Guide:
      - Introduction: guide/introduction.md
      - Getting Started: guide/getting-started.md
      - Architecture: guide/architecture.md
      - Verification: guide/verification.md
      - Deployment: guide/deployment.md
      - API Reference: guide/api-reference.md
